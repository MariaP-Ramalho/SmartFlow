services:
  mongo:
    image: mongo:7
    container_name: resolve-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - resolve-mongo-data:/data/db
    networks:
      - resolve-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resolve-backend
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/resolve-to-close
    depends_on:
      - mongo
    networks:
      - resolve-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
    container_name: resolve-frontend
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3003}
    networks:
      - resolve-network

networks:
  resolve-network:
    driver: bridge

volumes:
  resolve-mongo-data:
