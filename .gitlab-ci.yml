stages:
  - build-and-push
  - deploy

variables:
  DOCKER_IMAGE_BACKEND: "$DOCKER_HUB_USER/resolve-backend"
  DOCKER_IMAGE_FRONTEND: "$DOCKER_HUB_USER/resolve-frontend"

build-and-push:
  stage: build-and-push
  tags:
    - producao
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  only:
    - main
  script:
    - echo "$DOCKER_HUB_PWD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    - VERSION=$(cat VERSION)
    # Backend
    - docker build -t $DOCKER_IMAGE_BACKEND:latest -t $DOCKER_IMAGE_BACKEND:$VERSION ./backend
    - docker push $DOCKER_IMAGE_BACKEND:latest
    - docker push $DOCKER_IMAGE_BACKEND:$VERSION
    # Frontend (NEXT_PUBLIC_API_URL definido em CI/CD Variables do GitLab)
    - docker build --build-arg NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3003} -t $DOCKER_IMAGE_FRONTEND:latest -t $DOCKER_IMAGE_FRONTEND:$VERSION ./frontend
    - docker push $DOCKER_IMAGE_FRONTEND:latest
    - docker push $DOCKER_IMAGE_FRONTEND:$VERSION

deploy:
  stage: deploy
  tags:
    - producao
  only:
    - main
  script:
    - mkdir -p /opt/apps/resolve
    - export VERSION=$(cat VERSION)
    - export DOCKER_HUB_USER=${DOCKER_HUB_USER}
    - cp stack-resolve.yml /opt/apps/resolve/docker-compose.yml
    - |
      if [ ! -f /opt/apps/resolve/.env ]; then
        echo "WARN: /opt/apps/resolve/.env not found, creating from CI variables..."
        cat > /opt/apps/resolve/.env << ENVEOF
      PORT=3003
      NODE_ENV=production
      MONGODB_URI=${MONGODB_URI}
      JWT_SECRET=${JWT_SECRET}
      OPENAI_API_KEY=${OPENAI_API_KEY}
      CORS_ORIGINS=${CORS_ORIGINS:-https://resolve.makernocode.dev}
      ZAPFLOW_MCP_URL=${ZAPFLOW_MCP_URL}
      ZAPFLOW_MCP_TOKEN=${ZAPFLOW_MCP_TOKEN}
      UAZAPI_BASE_URL=${UAZAPI_BASE_URL}
      UAZAPI_INSTANCE_TOKEN=${UAZAPI_INSTANCE_TOKEN}
      MANAGER_WHATSAPP=${MANAGER_WHATSAPP}
      MIRROR_WHATSAPP_EXTRA=${MIRROR_WHATSAPP_EXTRA:-}
      AGENT_DISPLAY_NAME=${AGENT_DISPLAY_NAME:-Renato Solves}
      DEFAULT_LLM_PROVIDER=openai
      CHAT_MODEL=${CHAT_MODEL:-gpt-5.2}
      EMBEDDING_MODEL=text-embedding-3-small
      ADMIN_EMAIL=${ADMIN_EMAIL:-admin@resolve.com}
      ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      ENVEOF
      else
        echo "INFO: /opt/apps/resolve/.env already exists, keeping current values"
      fi
    - cd /opt/apps/resolve
    - docker compose pull
    - docker compose up -d --remove-orphans
