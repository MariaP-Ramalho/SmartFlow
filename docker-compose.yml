services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resolve-backend
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - ./backend/.env
    networks:
      - resolve-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
    container_name: resolve-frontend
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3003}
    networks:
      - resolve-network

networks:
  resolve-network:
    driver: bridge
